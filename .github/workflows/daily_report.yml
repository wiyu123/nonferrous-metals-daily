name: 有色金属行业动态

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00
    - cron: '0 10 * * 1-5'
  workflow_dispatch:   # 手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-zenhei

      - name: 安装依赖
        run: pip install matplotlib PyYAML requests

      - name: 生成并发送报告
        run: python metal_monitor.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: 提交更新后的缓存
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add output/spot_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "缓存无变化，跳过提交"
          else
            git commit -m "Auto: update spot cache $(date +%Y%m%d)"
            git push
          fi
